apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sops-age-key
  namespace: argo
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: sops-age-key
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: sops-age-key
        metadataPolicy: None
