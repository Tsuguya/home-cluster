apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-code-executor
  namespace: claude-code
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-code-executor
  namespace: claude-code
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: claude-code-executor
    namespace: claude-code
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-code-executor-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-code-sre-reader
subjects:
  - kind: ServiceAccount
    name: claude-code-executor
    namespace: claude-code
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: claude-code-executor-rss
  namespace: rss
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: claude-code-executor-rss
  namespace: rss
subjects:
  - kind: ServiceAccount
    name: claude-code-executor
    namespace: claude-code
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: claude-code-executor-rss
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-sso-admin-extras
  namespace: claude-code
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["argo-artifacts"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-sso-admin-extras
  namespace: claude-code
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argo-sso-admin-extras
subjects:
  - kind: ServiceAccount
    name: argo-workflows-sso-admin
    namespace: argo
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: claude-code
  namespace: claude-code
spec:
  activeDeadlineSeconds: 3600
  serviceAccountName: claude-code-executor
  entrypoint: main
  arguments:
    parameters:
      - name: issue-number
      - name: prompt
        default: "none"
  podMetadata:
    labels:
      claude-code: "true"
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: workspace
      emptyDir: {}
    - name: claude-home
      emptyDir: {}
    - name: mcp-config
      configMap:
        name: claude-code-mcp
    - name: github-token
      emptyDir: {}
    - name: github-app-secret
      secret:
        secretName: github-app-private-key
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - wn-03
  templates:
    - name: main
      steps:
        - - name: run
            template: claude-code
    - name: claude-code
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        fsGroup: 65532
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: setup
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [sh, -c]
          args:
            - |
              export GITHUB_TOKEN=$(cat /github-token/token)
              git config --global --add safe.directory /workspace
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/Tsuguya/home-rss.git" /workspace
              cd /workspace
              git checkout -b "issue-${ISSUE_NUMBER}"
              git config user.name "tgy-cluster-bot[bot]"
              git config user.email "tgy-cluster-bot[bot]@users.noreply.github.com"
              mkdir -p /workspace/.bin
              cp /usr/local/bin/github-signed-commit.sh /workspace/.bin/
              curl -sf -H "Authorization: token ${GITHUB_TOKEN}" "https://api.github.com/repos/Tsuguya/home-rss/issues/${ISSUE_NUMBER}" | jq -r '"# Issue #\(.number): \(.title)\n\n\(.body)"' > /workspace/ISSUE.md
              cp -R /workspace/k8s/.claude /claude-home/
          env:
            - name: HOME
              value: /tmp
            - name: ISSUE_NUMBER
              value: "{{workflow.parameters.issue-number}}"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: claude-home
              mountPath: /claude-home
            - name: github-token
              mountPath: /github-token
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      container:
        image: registry.infra.tgy.io/tools/claude-code:latest
        command: [sh, -c]
        args:
          - |
            export GITHUB_TOKEN=$(cat /github-token/token)
            if [ "$CUSTOM_PROMPT" != "none" ] && [ -n "$CUSTOM_PROMPT" ]; then
              PROMPT="$CUSTOM_PROMPT"
            else
              PROMPT="/workspace/ISSUE.md に対象 Issue の内容があります。これを読んで要件を理解し、実装してください。完了したらコミット・プッシュして PR を作成してください。Closes は ISSUE.md 冒頭の Issue 番号を使うこと。

            ## Git コミット（署名付き）
            git commit + git push の代わりに、github-signed-commit.sh を使うこと。
            1. git add でファイルをステージ
            2. /workspace/.bin/github-signed-commit.sh -r Tsuguya/home-rss -m 'コミットメッセージ' を実行
            これにより GitHub API 経由で署名付きコミットが作成され、ローカルも同期される。
            PR 作成は署名コミット後に gh pr create で行う。"
            fi
            cd /workspace
            claude -p "$PROMPT" --verbose --allowedTools "Bash,Read,Write,Edit,Glob,Grep,Agent" --mcp-config /mcp-config/mcp.json
        env:
          - name: HOME
            value: /claude-home
          - name: ISSUE_NUMBER
            value: "{{workflow.parameters.issue-number}}"
          - name: CUSTOM_PROMPT
            value: "{{workflow.parameters.prompt}}"
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: claude-code-token
                key: credential
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: claude-home
            mountPath: /claude-home
          - name: mcp-config
            mountPath: /mcp-config
            readOnly: true
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi
