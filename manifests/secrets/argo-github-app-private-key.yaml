apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-app-private-key
  namespace: argo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: github-app-private-key
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: github-app-private-key
        metadataPolicy: None
