apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: task-executor
  namespace: claude-code
spec:
  activeDeadlineSeconds: 1800
  serviceAccountName: claude-code-sre
  entrypoint: main
  arguments:
    parameters:
      - name: task-id
      - name: task-title
      - name: task-description
      - name: task-category
  podMetadata:
    labels:
      claude-code: "true"
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - wn-03
  templates:
    - name: main
      steps:
        - - name: execute
            template: execute

    - name: execute
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        fsGroup: 65532
      container:
        image: registry.infra.tgy.io/tools/claude-code:latest
        command: [sh, -c]
        args:
          - |
            TASK_ID='{{workflow.parameters.task-id}}'
            TASK_TITLE='{{workflow.parameters.task-title}}'
            TASK_DESC='{{workflow.parameters.task-description}}'
            TASK_CAT='{{workflow.parameters.task-category}}'
            HORENSO="http://horenso.horenso.svc.cluster.local:3000"

            # Mark task as running
            curl -s -X PATCH \
              -H "Content-Type: application/json" \
              -d '{"status":"running"}' \
              "$HORENSO/tasks/$TASK_ID" > /dev/null 2>&1 || true

            PROMPT="あなたは Kubernetes クラスタの運用エージェントです。以下のタスクを実行してください。

            ## タスク情報
            - ID: ${TASK_ID}
            - タイトル: ${TASK_TITLE}
            - カテゴリ: ${TASK_CAT}
            - 説明: ${TASK_DESC}

            ## クラスタ情報
            - CNI: Cilium（全 Pod にデフォルト deny の CiliumNetworkPolicy 適用）
            - GitOps: ArgoCD（home-cluster リポジトリ、selfHeal: true）
            - Observability: Prometheus + Loki + Hubble
            - ノード: cp-01/02/03 (control plane), wn-01/02/03 (worker)

            ## 使えるツール
            - kubectl（読み取り専用）
            - hubble observe（kubectl exec -n kube-system <cilium-pod> -- hubble observe）
            - logcli（Loki: http://loki-gateway.monitoring:80）
            - helm

            ## ルール
            - 調査結果・実行結果を明確に報告する
            - 変更が必要な場合は具体的な手順を提示する（直接変更しない）
            - 最後に結果のサマリーを /tmp/result.txt にテキストで書き出す（Write ツール使用）

            ## 権限不足・ブロッカー発生時
            RBAC 権限不足、CNP による通信ブロック、ツール不足などでタスクを達成できないと判断した場合:
            1. 無理に回避策を試し続けない（curl で代替する等の迂回は禁止）
            2. 何の権限/リソースが不足しているかを具体的に特定する
            3. /tmp/result.txt に「不足している権限」「必要な修正」を明記して早期終了する"

            claude -p \
              --verbose \
              --output-format stream-json \
              --dangerously-skip-permissions \
              --allowedTools "Bash(readonly=true),Read,Write,Grep,Glob" \
              --model sonnet \
              "$PROMPT" || true

            RESULT=""
            if [ -f /tmp/result.txt ]; then
              RESULT=$(head -c 3800 /tmp/result.txt)
            fi
            if [ -z "$RESULT" ]; then
              RESULT="結果ファイルが生成されませんでした。Argo UI でログを確認してください。"
            fi

            PAYLOAD=$(jq -n \
              --arg status "completed" \
              --arg result "$RESULT" \
              '{status:$status,result:$result}')
            curl -s -X PATCH \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "$HORENSO/tasks/$TASK_ID" || true
        env:
          - name: HOME
            value: /tmp
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: claude-code-token
                key: credential
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi
