apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: secureboot-signing-keys
  namespace: talos-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: secureboot-signing-keys
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: PK.auth
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secureboot-signing-keys/PK-auth
        metadataPolicy: None
    - secretKey: KEK.auth
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secureboot-signing-keys/KEK-auth
        metadataPolicy: None
    - secretKey: db.auth
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secureboot-signing-keys/db-auth
        metadataPolicy: None
    - secretKey: pcr-signing-key.pem
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secureboot-signing-keys/pcr-signing-key-pem
        metadataPolicy: None
    - secretKey: uki-signing-cert.pem
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secureboot-signing-keys/uki-signing-cert-pem
        metadataPolicy: None
    - secretKey: uki-signing-key.pem
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secureboot-signing-keys/uki-signing-key-pem
        metadataPolicy: None
