apiVersion: v1
kind: ServiceAccount
metadata:
  name: talos-build-executor
  namespace: talos-build
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: talos-build-executor
  namespace: talos-build
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: talos-build-executor
    namespace: talos-build
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: talos-secureboot-build
  namespace: talos-build
spec:
  activeDeadlineSeconds: 1800
  serviceAccountName: talos-build-executor
  entrypoint: main
  arguments:
    parameters:
      - name: version
  podMetadata:
    labels:
      talos-build: "true"
  securityContext:
    runAsUser: 0
    runAsNonRoot: false
    fsGroup: 0
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: secureboot-keys
      secret:
        secretName: secureboot-signing-keys
    - name: scripts
      configMap:
        name: talos-build-scripts
        defaultMode: 0755
    - name: github-token
      emptyDir: {}
    - name: github-app-secret
      secret:
        secretName: github-app-private-key
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - wn-03
  templates:
    - name: main
      steps:
        - - name: build-and-push-installer
            template: build-and-push-installer
          - name: build-and-push-iso
            template: build-and-push-iso
        - - name: finalize-release
            template: finalize-release

    - name: build-and-push-installer
      volumes:
        - name: docker-config
          emptyDir: {}
        - name: build
          emptyDir: {}
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: setup-registry-auth
          image: alpine:3.23
          command: [sh, -c]
          args:
            - |
              GITHUB_TOKEN=$(cat /github-token/token)
              printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$(printf '%s:%s' x-access-token "$GITHUB_TOKEN" | base64)" > /docker-config/config.json
          volumeMounts:
            - name: docker-config
              mountPath: /docker-config
            - name: github-token
              mountPath: /github-token
              readOnly: true
        - name: build
          image: "ghcr.io/tsuguya/imager:{{workflow.parameters.version}}"
          command: [/bin/imager]
          args:
            - secureboot-installer
            - --arch
            - amd64
            - --system-extension-image
            - ghcr.io/tsuguya/iscsi-tools:v0.2.0-pre-consolidation
            - --system-extension-image
            - ghcr.io/siderolabs/spin:v0.22.0
            - --system-extension-image
            - ghcr.io/siderolabs/kata-containers:3.27.0
            - --base-installer-image
            - "ghcr.io/tsuguya/installer-base:{{workflow.parameters.version}}"
            - --extra-kernel-arg
            - "-lockdown"
            - --extra-kernel-arg
            - "lockdown=integrity"
            - --output
            - /build
          env:
            - name: DOCKER_CONFIG
              value: /docker-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: secureboot-keys
              mountPath: /secureboot
              readOnly: true
            - name: docker-config
              mountPath: /docker-config
              readOnly: true
            - name: build
              mountPath: /build
      container:
        image: alpine:3.23
        command: [sh, /scripts/push-installer.sh]
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
        env:
          - name: VERSION
            value: "{{workflow.parameters.version}}"
          - name: DOCKER_CONFIG
            value: /tmp
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
        volumeMounts:
          - name: scripts
            mountPath: /scripts
            readOnly: true
          - name: github-token
            mountPath: /github-token
            readOnly: true
          - name: build
            mountPath: /build
            readOnly: true

    - name: build-and-push-iso
      volumes:
        - name: docker-config
          emptyDir: {}
        - name: build-sb-iso
          emptyDir: {}
        - name: build-iso
          emptyDir: {}
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: setup-registry-auth
          image: alpine:3.23
          command: [sh, -c]
          args:
            - |
              GITHUB_TOKEN=$(cat /github-token/token)
              printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$(printf '%s:%s' x-access-token "$GITHUB_TOKEN" | base64)" > /docker-config/config.json
          volumeMounts:
            - name: docker-config
              mountPath: /docker-config
            - name: github-token
              mountPath: /github-token
              readOnly: true
        - name: build-secureboot-iso
          image: "ghcr.io/tsuguya/imager:{{workflow.parameters.version}}"
          command: [/bin/imager]
          args:
            - secureboot-iso
            - --arch
            - amd64
            - --system-extension-image
            - ghcr.io/tsuguya/iscsi-tools:v0.2.0-pre-consolidation
            - --system-extension-image
            - ghcr.io/siderolabs/spin:v0.22.0
            - --system-extension-image
            - ghcr.io/siderolabs/kata-containers:3.27.0
            - --base-installer-image
            - "ghcr.io/tsuguya/installer-base:{{workflow.parameters.version}}"
            - --extra-kernel-arg
            - "-lockdown"
            - --extra-kernel-arg
            - "lockdown=integrity"
            - --output
            - /build-sb-iso
          env:
            - name: DOCKER_CONFIG
              value: /docker-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: secureboot-keys
              mountPath: /secureboot
              readOnly: true
            - name: docker-config
              mountPath: /docker-config
              readOnly: true
            - name: build-sb-iso
              mountPath: /build-sb-iso
        - name: build-iso
          image: "ghcr.io/tsuguya/imager:{{workflow.parameters.version}}"
          command: [/bin/imager]
          args:
            - iso
            - --arch
            - amd64
            - --system-extension-image
            - ghcr.io/tsuguya/iscsi-tools:v0.2.0-pre-consolidation
            - --system-extension-image
            - ghcr.io/siderolabs/spin:v0.22.0
            - --system-extension-image
            - ghcr.io/siderolabs/kata-containers:3.27.0
            - --base-installer-image
            - "ghcr.io/tsuguya/installer-base:{{workflow.parameters.version}}"
            - --extra-kernel-arg
            - "-lockdown"
            - --extra-kernel-arg
            - "lockdown=integrity"
            - --output
            - /build-iso
          env:
            - name: DOCKER_CONFIG
              value: /docker-config
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              memory: 2Gi
          volumeMounts:
            - name: secureboot-keys
              mountPath: /secureboot
              readOnly: true
            - name: docker-config
              mountPath: /docker-config
              readOnly: true
            - name: build-iso
              mountPath: /build-iso
      container:
        image: alpine:3.23
        command: [sh, /scripts/push-iso.sh]
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
        env:
          - name: VERSION
            value: "{{workflow.parameters.version}}"
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
        volumeMounts:
          - name: scripts
            mountPath: /scripts
            readOnly: true
          - name: github-token
            mountPath: /github-token
            readOnly: true
          - name: build-sb-iso
            mountPath: /build-sb-iso
            readOnly: true
          - name: build-iso
            mountPath: /build-iso
            readOnly: true

    - name: finalize-release
      volumes:
        - name: github-token
          emptyDir: {}
        - name: github-app-secret
          secret:
            secretName: github-app-private-key
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      container:
        image: alpine:3.23
        command: [sh, /scripts/finalize-release.sh]
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
        env:
          - name: VERSION
            value: "{{workflow.parameters.version}}"
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        volumeMounts:
          - name: scripts
            mountPath: /scripts
            readOnly: true
          - name: github-token
            mountPath: /github-token
            readOnly: true
