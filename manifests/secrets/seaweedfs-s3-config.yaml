apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
  namespace: seaweedfs
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: seaweedfs-s3-config
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: seaweedfs-s3-config
