global:
  monitoring:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack
  automountServiceAccountToken: false

master:
  replicas: 3
  defaultReplication: "000"
  data:
    type: "emptyDir"
  logs:
    type: "emptyDir"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  tolerations: |
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: memory-constrained
      operator: Exists
      effect: NoSchedule
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  extraVolumes: |
    - name: tmp
      emptyDir: {}
  extraVolumeMounts: |
    - name: tmp
      mountPath: /tmp

volume:
  replicas: 1
  dataDirs:
    - name: data
      type: "persistentVolumeClaim"
      size: "50Gi"
      storageClass: "qnap-iscsi"
      maxVolumes: 0
  idx: {}
  logs:
    type: "emptyDir"
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      memory: 512Mi
  nodeSelector: |
    kubernetes.io/hostname: wn-02
  tolerations: |
    - key: memory-constrained
      operator: Exists
      effect: NoSchedule
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  extraVolumes: |
    - name: tmp
      emptyDir: {}
  extraVolumeMounts: |
    - name: tmp
      mountPath: /tmp

filer:
  replicas: 1
  data:
    type: "emptyDir"
  logs:
    type: "emptyDir"
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
    limits:
      memory: 768Mi
  nodeSelector: |
    kubernetes.io/hostname: wn-02
  tolerations: |
    - key: memory-constrained
      operator: Exists
      effect: NoSchedule
  podSecurityContext:
    enabled: true
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    enabled: true
    readOnlyRootFilesystem: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  secretExtraEnvironmentVars:
    WEED_POSTGRES2_USERNAME:
      secretKeyRef:
        name: seaweedfs-pg-credentials
        key: username
    WEED_POSTGRES2_PASSWORD:
      secretKeyRef:
        name: seaweedfs-pg-credentials
        key: password
  s3:
    enabled: true
    port: 8333
    enableAuth: true
    existingConfigSecret: seaweedfs-s3-config
    createBuckets:
      - name: loki-storage
      - name: tempo-storage
      - name: argo-artifacts
      - name: nextcloud
      - name: harbor
  extraEnvironmentVars:
    WEED_LEVELDB2_ENABLED: "false"
    WEED_POSTGRES2_ENABLED: "true"
    WEED_POSTGRES2_CREATETABLE: 'CREATE TABLE IF NOT EXISTS "%s" (dirhash BIGINT, name VARCHAR(65535), directory VARCHAR(65535), meta bytea, PRIMARY KEY (dirhash, name));'
    WEED_POSTGRES2_HOSTNAME: "shared-pg-rw.database"
    WEED_POSTGRES2_PORT: "5432"
    WEED_POSTGRES2_DATABASE: "seaweedfs"
    WEED_POSTGRES2_SSLMODE: "verify-full"
    WEED_POSTGRES2_SSLROOTCERT: "/etc/ssl/certs/pg-ca.crt"
    WEED_POSTGRES2_CONNECTION_MAX_IDLE: "5"
    WEED_POSTGRES2_CONNECTION_MAX_OPEN: "10"
    WEED_POSTGRES2_ENABLEUPSERT: "true"
    WEED_POSTGRES2_UPSERTQUERY: 'INSERT INTO "%[1]s" (dirhash, name, directory, meta) VALUES($1, $2, $3, $4) ON CONFLICT (dirhash, name) DO UPDATE SET directory=EXCLUDED.directory, meta=EXCLUDED.meta'
    WEED_FILER_OPTIONS_RECURSIVE_DELETE: "false"
    WEED_FILER_BUCKETS_FOLDER: "/buckets"
  extraVolumes: |
    - name: tmp
      emptyDir: {}
    - name: pg-ca-cert
      secret:
        secretName: pg-ca-cert
  extraVolumeMounts: |
    - name: tmp
      mountPath: /tmp
    - name: pg-ca-cert
      mountPath: /etc/ssl/certs/pg-ca.crt
      subPath: ca.crt
      readOnly: true

s3:
  enabled: false
