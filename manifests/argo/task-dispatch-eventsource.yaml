apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: task-dispatch
  namespace: argo
spec:
  service:
    ports:
      - port: 12002
        targetPort: 12002
  webhook:
    task:
      port: "12002"
      endpoint: /task
      method: POST
    adjudicate:
      port: "12002"
      endpoint: /adjudicate
      method: POST
  template:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
