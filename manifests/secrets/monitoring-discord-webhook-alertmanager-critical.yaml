apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhook-alertmanager-critical
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: discord-webhook-alertmanager-critical
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: url
      remoteRef:
        key: discord-webhook-alerts-critical
        property: webhook_url
