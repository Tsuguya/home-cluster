apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: ollama
  namespace: ollama
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: memory
            io.kubernetes.pod.namespace: memory
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
  egress:
    - toFQDNs:
        - matchName: registry.ollama.ai
        - matchPattern: "*.ollama.com"
        - matchPattern: "*.r2.cloudflarestorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
