apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: memory
  namespace: argocd
spec:
  project: apps
  source:
    repoURL: https://github.com/Tsuguya/home-cluster.git
    targetRevision: main
    path: manifests/memory
  destination:
    server: https://kubernetes.default.svc
    namespace: memory
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
