name: Digest cooldown

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  cooldown:
    runs-on: ubuntu-latest
    steps:
      - uses: Tsuguya/images/digest-cooldown@b4989f2dd59468c0124943fb62277861e38eadcb # main
        with:
          cooldown-days: 3
