apiVersion: v1
kind: ServiceAccount
metadata:
  name: kanidm-backup-executor
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kanidm-backup-executor
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: kanidm-backup-executor
    namespace: argo
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: kanidm-backup
  namespace: argo
spec:
  activeDeadlineSeconds: 300
  serviceAccountName: kanidm-backup-executor
  entrypoint: main
  templates:
    - name: main
      metadata:
        labels:
          kanidm-backup: "true"
      container:
        image: registry.infra.tgy.io/tools/talos-tools:latest
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        command: [sh, -c]
        args:
          - |
            set -euo pipefail

            echo "=== Taking Kanidm backup via scripting interface ==="
            TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
            kubectl exec -n kanidm kanidm-0 -- kanidmd scripting backup -c /config/server.toml > /tmp/kanidm-backup

            BACKUP_SIZE=$(wc -c < /tmp/kanidm-backup)
            echo "Backup size: ${BACKUP_SIZE} bytes"

            if [ "$BACKUP_SIZE" -lt 100 ]; then
              echo "ERROR: Backup too small, likely failed"
              exit 1
            fi

            echo "=== Uploading to R2 ==="
            curl -fsSL --aws-sigv4 "aws:amz:auto:s3" \
              --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
              -H "Content-Type: application/octet-stream" \
              -T /tmp/kanidm-backup \
              "${R2_ENDPOINT}/home-cluster-backup/kanidm/${TIMESTAMP}.backup"

            echo "=== Done ==="
            echo "Uploaded: kanidm/${TIMESTAMP}.backup (${BACKUP_SIZE} bytes)"
        env:
          - name: R2_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: r2-backup-credentials
                key: endpoint
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: r2-backup-credentials
                key: credential
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: r2-backup-credentials
                key: password
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: kanidm-backup
  namespace: argo
spec:
  schedule: "30 4 * * *"
  timezone: Asia/Tokyo
  concurrencyPolicy: Replace
  workflowSpec:
    workflowTemplateRef:
      name: kanidm-backup
