apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: single-repo-build
  namespace: argo
spec:
  template:
    serviceAccountName: workflow-executor
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
  dependencies:
    - name: memory-push
      eventSourceName: github-webhook
      eventName: memory
      filters:
        script: &buildFilter |-
          if event.body == nil or event.body.ref ~= "refs/heads/main" or event.body.commits == nil then
            return false
          end
          for _, c in ipairs(event.body.commits) do
            for _, list in ipairs({c.added or {}, c.modified or {}, c.removed or {}}) do
              for _, f in ipairs(list) do
                if string.find(f, "Dockerfile", 1, true)
                  or string.find(f, "src/", 1, true)
                  or string.find(f, "package.json", 1, true)
                  or string.find(f, "package-lock.json", 1, true)
                  or string.find(f, "tsconfig.json", 1, true) then
                  return true
                end
              end
            end
          end
          return false
    - name: horenso-push
      eventSourceName: github-webhook
      eventName: horenso
      filters:
        script: *buildFilter
  triggers:
    - template:
        name: memory-build
        conditions: "memory-push"
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: memory-build-
                namespace: image-build
              spec:
                workflowTemplateRef:
                  name: single-repo-image-build
                arguments:
                  parameters:
                    - name: repo-url
                      value: github.com/Tsuguya/memory
                    - name: image-name
                      value: memory
                    - name: commit-sha
                      value: ""
          parameters:
            - src:
                dependencyName: memory-push
                dataKey: body.after
              dest: spec.arguments.parameters.2.value
    - template:
        name: horenso-build
        conditions: "horenso-push"
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: horenso-build-
                namespace: image-build
              spec:
                workflowTemplateRef:
                  name: single-repo-image-build
                arguments:
                  parameters:
                    - name: repo-url
                      value: github.com/Tsuguya/horenso
                    - name: image-name
                      value: horenso
                    - name: commit-sha
                      value: ""
          parameters:
            - src:
                dependencyName: horenso-push
                dataKey: body.after
              dest: spec.arguments.parameters.2.value
