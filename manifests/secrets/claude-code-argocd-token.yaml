apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-cluster-bot-token
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: argocd-cluster-bot-token
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        key: ArgoCD Cluster Bot Token
        property: token
