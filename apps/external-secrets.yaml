apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: security
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: "2.2.0"
      helm:
        releaseName: external-secrets
        valueFiles:
          - $values/helm-values/external-secrets/values.yaml
    - repoURL: https://1password.github.io/connect-helm-charts
      chart: connect
      targetRevision: "2.4.0"
      helm:
        releaseName: onepassword-connect
        valueFiles:
          - $values/helm-values/onepassword-connect/values.yaml
    - repoURL: https://github.com/Tsuguya/home-cluster.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/Tsuguya/home-cluster.git
      targetRevision: main
      path: manifests/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
