apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shared-pg-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: shared-pg-credentials
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: shared-pg-credentials
