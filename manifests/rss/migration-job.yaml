apiVersion: batch/v1
kind: Job
metadata:
  name: rss-migration
  namespace: rss
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: rss-migration
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dbmate
          image: ghcr.io/amacneil/dbmate:2
          command: ["/bin/sh", "-c"]
          args:
            - |
              encoded=$(printf '%s' "$DB_PASS" | sed 's/%/%25/g; s|/|%2F|g; s|+|%2B|g; s|=|%3D|g; s| |%20|g; s|@|%40|g; s|:|%3A|g; s|?|%3F|g; s|#|%23|g; s|\&|%26|g')
              export DATABASE_URL="postgresql://${DB_USER}:${encoded}@rss-pg-rw.rss.svc.cluster.local:5432/rssreader?sslmode=require"
              exec dbmate --migrations-dir /app/db/migrations up
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rss-pg-credentials
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: rss-pg-credentials
                  key: password
          volumeMounts:
            - name: migrations
              mountPath: /app/db/migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: rss-migrations
      restartPolicy: Never
