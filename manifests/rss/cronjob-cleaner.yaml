apiVersion: batch/v1
kind: CronJob
metadata:
  name: rss-cleaner
  namespace: rss
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: rss-cleaner
        spec:
          runtimeClassName: wasmtime-spin-v2
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: cleaner
              image: ghcr.io/tsuguya/home-rss-cleaner:v0.0.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 128Mi
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: rss-pg-credentials
                      key: uri
          restartPolicy: Never
