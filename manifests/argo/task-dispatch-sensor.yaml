apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: task-dispatch
  namespace: argo
spec:
  dependencies:
    - name: task-readonly
      eventSourceName: task-dispatch
      eventName: task
      filters:
        data:
          - path: body.category
            type: string
            value:
              - investigate
              - observe
              - operate
    - name: task-write
      eventSourceName: task-dispatch
      eventName: task
      filters:
        data:
          - path: body.category
            type: string
            value:
              - modify_manifest
              - modify_infra
              - modify_cloudflare
    - name: adjudicate
      eventSourceName: task-dispatch
      eventName: adjudicate
  triggers:
    - template:
        conditions: task-readonly
        name: execute-readonly
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: task-exec-
                namespace: claude-code
              spec:
                workflowTemplateRef:
                  name: task-executor
                arguments:
                  parameters:
                    - name: task-id
                    - name: task-title
                    - name: task-description
                    - name: task-category
          parameters:
            - src:
                dependencyName: task-readonly
                dataKey: body.id
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: task-readonly
                dataKey: body.title
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: task-readonly
                dataKey: body.description
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: task-readonly
                dataKey: body.category
              dest: spec.arguments.parameters.3.value
    - template:
        conditions: task-write
        name: execute-write
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: task-write-
                namespace: claude-code
              spec:
                workflowTemplateRef:
                  name: task-executor-write
                arguments:
                  parameters:
                    - name: task-id
                    - name: task-title
                    - name: task-description
                    - name: task-category
          parameters:
            - src:
                dependencyName: task-write
                dataKey: body.id
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: task-write
                dataKey: body.title
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: task-write
                dataKey: body.description
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: task-write
                dataKey: body.category
              dest: spec.arguments.parameters.3.value
    - template:
        conditions: adjudicate
        name: execute-adjudicate
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: adjudicate-
                namespace: claude-code
              spec:
                workflowTemplateRef:
                  name: adjudicator
                arguments:
                  parameters:
                    - name: context
                    - name: source-workflow
                    - name: source-namespace
          parameters:
            - src:
                dependencyName: adjudicate
                dataKey: body.context
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: adjudicate
                dataKey: body.source_workflow
                value: ""
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: adjudicate
                dataKey: body.source_namespace
                value: "claude-code"
              dest: spec.arguments.parameters.2.value
  template:
    serviceAccountName: task-dispatch-sensor
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
