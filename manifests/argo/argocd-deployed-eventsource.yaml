apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: argocd-deployed
  namespace: argo
spec:
  service:
    ports:
      - port: 12003
        targetPort: 12003
  webhook:
    deployed:
      port: "12003"
      endpoint: /deployed
      method: POST
  template:
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    container:
      securityContext:
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ALL]
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
