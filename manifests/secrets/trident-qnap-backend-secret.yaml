apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: qnap-backend-secret
  namespace: trident
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: qnap-backend-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: qnap-backend-secret
        metadataPolicy: None
