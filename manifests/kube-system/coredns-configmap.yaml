apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
            lameduck 5s
        }
        ready
        log . {
            class error
        }
        prometheus :9153

        rewrite name registry.infra.tgy.io harbor.harbor.svc.cluster.local

        hosts {
            192.168.0.192  idm.tgy.io
            192.168.0.191  argocd.infra.tgy.io
            192.168.0.190  nc.tgy.io
            192.168.0.190  reader.tgy.io
            fallthrough
        }

        template IN A infra.tgy.io {
            match ".*\.infra\.tgy\.io\.$"
            answer "{{ .Name }} 60 IN A 192.168.0.190"
            fallthrough
        }

        kubernetes cluster.local in-addr.arpa ip6.arpa {
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        }
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30 {
           disable success cluster.local
           disable denial cluster.local
        }
        loop
        reload
        loadbalance
    }
