apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-code-config
  namespace: argocd
spec:
  project: argo
  source:
    repoURL: https://github.com/Tsuguya/home-rss.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: claude-code
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
