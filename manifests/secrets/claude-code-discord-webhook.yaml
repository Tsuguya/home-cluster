apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhook-argo
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: discord-webhook-argo
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: discord-webhook-argo
