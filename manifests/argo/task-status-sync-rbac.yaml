apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-status-sync
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-status-sync-watch
  namespace: claude-code
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-status-sync-watch
  namespace: claude-code
subjects:
  - kind: ServiceAccount
    name: task-status-sync
    namespace: argo
roleRef:
  kind: Role
  name: task-status-sync-watch
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-status-sync-submit
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-status-sync-submit
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: task-status-sync
    namespace: argo
roleRef:
  kind: Role
  name: task-status-sync-submit
  apiGroup: rbac.authorization.k8s.io
