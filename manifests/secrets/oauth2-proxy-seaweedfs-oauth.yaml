apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy-seaweedfs-oauth
  namespace: oauth2-proxy
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: oauth2-proxy-seaweedfs-oauth
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: oauth2-proxy-seaweedfs
