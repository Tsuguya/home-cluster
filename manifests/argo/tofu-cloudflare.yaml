apiVersion: v1
kind: ServiceAccount
metadata:
  name: tofu-executor
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tofu-executor
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: tofu-executor
    namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tofu-state-manager
  namespace: argo
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tofu-state-manager
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tofu-state-manager
subjects:
  - kind: ServiceAccount
    name: tofu-executor
    namespace: argo
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tofu-cloudflare
  namespace: argo
spec:
  activeDeadlineSeconds: 600
  serviceAccountName: tofu-executor
  entrypoint: main
  arguments:
    parameters:
      - name: command
        default: apply
        enum:
          - plan
          - apply
  templates:
    - name: main
      volumes:
        - name: workspace
          emptyDir: {}
        - name: github-token
          emptyDir: {}
        - name: github-app-secret
          secret:
            secretName: github-app-private-key
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: git-clone
          image: alpine/git:v2.52.0
          command: [sh, -c]
          args:
            - |
              GITHUB_TOKEN=$(cat /github-token/token)
              git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/Tsuguya/home-cloudflare.git" /workspace
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: github-token
              mountPath: /github-token
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      container:
        image: ghcr.io/opentofu/opentofu:1.11.6
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        command: [sh, -c]
        args:
          - |
            cd /workspace
            tofu init
            if [ "{{workflow.parameters.command}}" = "apply" ]; then
              tofu apply -auto-approve
            else
              tofu plan
            fi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        env:
          - name: CLOUDFLARE_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: api_token
          - name: TF_VAR_cloudflare_account_id
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: account_id
          - name: TF_VAR_cloudflare_zone_id
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: zone_id
          - name: TF_VAR_discord_webhook_url
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: discord_webhook_url
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tofu-cloudflare-plan
  namespace: argo
spec:
  activeDeadlineSeconds: 600
  serviceAccountName: tofu-executor
  entrypoint: main
  arguments:
    parameters:
      - name: pr-number
      - name: branch
      - name: author
        default: ""
  templates:
    - name: main
      volumes:
        - name: workspace
          emptyDir: {}
        - name: github-token
          emptyDir: {}
        - name: tools
          emptyDir: {}
        - name: github-app-secret
          secret:
            secretName: github-app-private-key
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: copy-tools
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [sh, -c]
          args:
            - cp /usr/local/bin/jq /usr/local/bin/gh /tools/
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tools
              mountPath: /tools
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
        - name: git-clone
          image: alpine/git:v2.52.0
          command: [sh, -c]
          args:
            - |
              GITHUB_TOKEN=$(cat /github-token/token)
              git clone --depth 1 -b "${BRANCH}" "https://x-access-token:${GITHUB_TOKEN}@github.com/Tsuguya/home-cloudflare.git" /workspace
          env:
            - name: BRANCH
              value: "{{workflow.parameters.branch}}"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: github-token
              mountPath: /github-token
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      container:
        image: ghcr.io/opentofu/opentofu:1.11.6
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        command: [sh, -c]
        args:
          - |
            set -uo pipefail
            export GITHUB_TOKEN=$(cat /github-token/token)
            export PATH="/tools:$PATH"

            cd /workspace
            tofu init -input=false
            PLAN_OUTPUT=$(tofu plan -detailed-exitcode -no-color 2>&1) && EXIT_CODE=0 || EXIT_CODE=$?
            PR="{{workflow.parameters.pr-number}}"
            REPO="Tsuguya/home-cloudflare"
            if [ "$EXIT_CODE" = "0" ]; then
              TITLE="Tofu Plan: No Changes"
              MSG="Infrastructure is up-to-date."
            elif [ "$EXIT_CODE" = "2" ]; then
              TITLE="Tofu Plan: Changes Detected"
              MSG="Review required before merge."
            else
              TITLE="Tofu Plan: Error"
              MSG="Plan failed with exit code $EXIT_CODE."
            fi
            BODY=$(jq -n \
              --arg title "$TITLE" \
              --arg msg "$MSG" \
              --arg output "$PLAN_OUTPUT" \
              '{body: ("### " + $title + "\n" + $msg + "\n\n<details>\n<summary>Plan Output</summary>\n\n```\n" + $output + "\n```\n\n</details>")}')
            echo "$BODY" | gh api "repos/$REPO/issues/$PR/comments" --input -
            AUTHOR="{{workflow.parameters.author}}"
            if [ "$EXIT_CODE" = "0" ] && [ "$AUTHOR" = "renovate[bot]" ]; then
              gh api "repos/$REPO/pulls/$PR/merge" --method PUT -f merge_method=squash
            fi
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: github-token
            mountPath: /github-token
            readOnly: true
          - name: tools
            mountPath: /tools
            readOnly: true
        env:
          - name: CLOUDFLARE_API_TOKEN
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: api_token
          - name: TF_VAR_cloudflare_account_id
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: account_id
          - name: TF_VAR_cloudflare_zone_id
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: zone_id
          - name: TF_VAR_discord_webhook_url
            valueFrom:
              secretKeyRef:
                name: cloudflare-tofu-credentials
                key: discord_webhook_url
