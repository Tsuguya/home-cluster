apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-pg-credentials
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor-pg-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: harbor-pg-credentials
