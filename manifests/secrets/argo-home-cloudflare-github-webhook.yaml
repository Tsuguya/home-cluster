apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-cloudflare-github-webhook
  namespace: argo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: home-cloudflare-github-webhook
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: home-cloudflare-github-webhook
        metadataPolicy: None
