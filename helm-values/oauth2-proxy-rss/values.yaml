config:
  existingSecret: oauth2-proxy-rss-oauth
  cookieName: "_oauth2_proxy_rss"
  configFile: ""

extraArgs:
  provider: oidc
  oidc-issuer-url: "https://idm.tgy.io/oauth2/openid/oauth2-proxy-rss"
  redirect-url: "https://rss.infra.tgy.io/oauth2/callback"
  upstream: "http://rss-ui.rss.svc.cluster.local:80"
  email-domain: "*"
  skip-provider-button: "true"
  code-challenge-method: S256
  reverse-proxy: "true"

service:
  portNumber: 4180

serviceAccount:
  automountServiceAccountToken: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi
