apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cosign-signing-key
  namespace: image-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cosign-signing-key
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: cosign.key
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: cosign-signing-key
        metadataPolicy: None
        property: private-key
    - secretKey: cosign.pub
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: cosign-signing-key
        metadataPolicy: None
        property: public-key
