replicaCount: 1

image:
  useUnprivilegedImage: true

config:
  cluster:
    enabled: false

service:
  type: ClusterIP

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 3000
  seccompProfile:
    type: RuntimeDefault

serviceAccount:
  create: false

updateVolumeFsOwnership: false

persistence:
  size: 2Gi
  storageClassName: qnap-nfs

snapshotPersistence:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 12
