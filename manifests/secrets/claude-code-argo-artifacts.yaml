apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argo-artifacts
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: argo-artifacts
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: seaweedfs-argo-s3
