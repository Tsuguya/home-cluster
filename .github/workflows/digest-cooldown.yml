name: Digest cooldown

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  cooldown:
    runs-on: ubuntu-latest
    steps:
      - uses: Tsuguya/images/digest-cooldown@4f71c48810ab6d759062d8ae6dc7ffe45ceaf0d5 # main
        with:
          cooldown-days: 3
