apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: tempo-storage
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: tempo-storage
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: tempo-storage
