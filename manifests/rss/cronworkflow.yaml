apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-executor
  namespace: rss
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: workflow-executor
    namespace: argo
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: rss-fetcher
  namespace: rss
spec:
  activeDeadlineSeconds: 300
  serviceAccountName: workflow-executor
  entrypoint: main
  templates:
    - name: main
      metadata:
        labels:
          rss-cron: "true"
      container:
        image: curlimages/curl:8.12.1
        command: [sh, -c]
        args:
          - curl -fsS -X POST http://rss-fetcher:80/fetch
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: rss-fetcher
  namespace: rss
spec:
  schedule: "*/15 * * * *"
  timezone: Asia/Tokyo
  concurrencyPolicy: Forbid
  workflowSpec:
    workflowTemplateRef:
      name: rss-fetcher
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: rss-cleaner
  namespace: rss
spec:
  activeDeadlineSeconds: 300
  serviceAccountName: workflow-executor
  entrypoint: main
  templates:
    - name: main
      metadata:
        labels:
          rss-cron: "true"
      container:
        image: curlimages/curl:8.12.1
        command: [sh, -c]
        args:
          - curl -fsS -X POST http://rss-cleaner:80/clean
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: rss-cleaner
  namespace: rss
spec:
  schedule: "0 3 * * *"
  timezone: Asia/Tokyo
  concurrencyPolicy: Forbid
  workflowSpec:
    workflowTemplateRef:
      name: rss-cleaner
