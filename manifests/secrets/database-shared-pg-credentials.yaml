apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: shared-pg-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: shared-pg-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: Shared PostgreSQL
        metadataPolicy: None
