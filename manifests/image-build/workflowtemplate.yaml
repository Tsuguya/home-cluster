apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-build-executor
  namespace: image-build
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: image-build-executor
  namespace: image-build
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: image-build-executor
    namespace: image-build
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: image-build
  namespace: image-build
spec:
  activeDeadlineSeconds: 1800
  serviceAccountName: image-build-executor
  entrypoint: main
  arguments:
    parameters:
      - name: commit-sha
      - name: before-sha
  podMetadata:
    labels:
      image-build: "true"
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  templates:
    - name: main
      steps:
        - - name: detect-changes
            template: detect-changes
        - - name: build
            template: build-image
            arguments:
              parameters:
                - name: image-dir
                  value: "{{item}}"
            withParam: "{{steps.detect-changes.outputs.parameters.changed-dirs}}"

    - name: detect-changes
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        fsGroup: 65532
      volumes:
        - name: github-token
          emptyDir: {}
        - name: github-app-secret
          secret:
            secretName: github-app-private-key
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      container:
        image: alpine/git:v2.52.0
        command: [sh, -c]
        args:
          - |
            GITHUB_TOKEN=$(cat /github-token/token)
            cd /tmp
            git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/Tsuguya/images.git" repo
            cd repo
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              find . -name Dockerfile -not -path './.git/*' | sed 's|^./||;s|/Dockerfile$||' | sort -u
            else
              git diff --name-only "$BEFORE".."$AFTER" -- '*/Dockerfile' | sed 's|/Dockerfile$||' | sort -u
            fi | awk 'BEGIN{printf "["} NR>1{printf ","} {printf "\"%s\"",$0} END{print "]"}' > /tmp/changed-dirs
        env:
          - name: BEFORE
            value: "{{workflow.parameters.before-sha}}"
          - name: AFTER
            value: "{{workflow.parameters.commit-sha}}"
        volumeMounts:
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
      outputs:
        parameters:
          - name: changed-dirs
            valueFrom:
              path: /tmp/changed-dirs

    - name: build-image
      inputs:
        parameters:
          - name: image-dir
      steps:
        - - name: build
            template: buildkit-build
            arguments:
              parameters:
                - name: image-dir
                  value: "{{inputs.parameters.image-dir}}"
        - - name: sign
            template: cosign-sign
            arguments:
              parameters:
                - name: image-dir
                  value: "{{inputs.parameters.image-dir}}"
                - name: digest
                  value: "{{steps.build.outputs.parameters.digest}}"

    - name: buildkit-build
      inputs:
        parameters:
          - name: image-dir
      podSpecPatch: '{"runtimeClassName": "kata"}'
      metadata:
        annotations:
          io.katacontainers.config.hypervisor.virtio_fs_extra_args: '["--thread-pool-size=1", "--announce-submounts", "--xattr"]'
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        fsGroup: 0
      volumes:
        - name: workspace
          emptyDir: {}
        - name: docker-config
          emptyDir: {}
        - name: github-token
          emptyDir: {}
        - name: github-app-secret
          secret:
            secretName: github-app-private-key
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: clone-repo
          image: alpine/git:v2.52.0
          command: [sh, -c]
          args:
            - |
              GITHUB_TOKEN=$(cat /github-token/token)
              git config --global --add safe.directory /workspace
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/Tsuguya/images.git" /workspace
              cd /workspace && git checkout "$COMMIT_SHA"
          env:
            - name: HOME
              value: /tmp
            - name: COMMIT_SHA
              value: "{{workflow.parameters.commit-sha}}"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: github-token
              mountPath: /github-token
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
        - name: setup-registry-auth
          image: alpine:3.23
          command: [sh, -c]
          args:
            - printf '{"auths":{"registry.infra.tgy.io":{"auth":"%s"}}}' "$(printf '%s:%s' "$HARBOR_USER" "$HARBOR_PASS" | base64)" > /docker-config/config.json
          env:
            - name: HARBOR_USER
              valueFrom:
                secretKeyRef:
                  name: harbor-robot-images
                  key: username
            - name: HARBOR_PASS
              valueFrom:
                secretKeyRef:
                  name: harbor-robot-images
                  key: credential
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: docker-config
              mountPath: /docker-config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      container:
        image: moby/buildkit:v0.28.0
        command: [sh, -c]
        args:
          - |
            mkdir -p /workspace/.buildkit /workspace/.buildkit/tmp
            export BUILDKIT_TMPDIR=/workspace/.buildkit
            export TMPDIR=/workspace/.buildkit/tmp
            buildctl-daemonless.sh build \
              --frontend dockerfile.v0 \
              --local context=/workspace/{{inputs.parameters.image-dir}} \
              --local dockerfile=/workspace/{{inputs.parameters.image-dir}} \
              --output type=image,name=registry.infra.tgy.io/tools/{{inputs.parameters.image-dir}}:latest,push=true \
              --output type=image,name=registry.infra.tgy.io/tools/{{inputs.parameters.image-dir}}:{{workflow.parameters.commit-sha}},push=true \
              --metadata-file /workspace/metadata.json
            cat /workspace/metadata.json
            grep -oE 'sha256:[a-f0-9]{64}' /workspace/metadata.json | head -1 > /workspace/digest
        env:
          - name: DOCKER_CONFIG
            value: /docker-config
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true
          capabilities:
            add: [ALL]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: docker-config
            mountPath: /docker-config
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi
      outputs:
        parameters:
          - name: digest
            valueFrom:
              path: /workspace/digest

    - name: cosign-sign
      inputs:
        parameters:
          - name: image-dir
          - name: digest
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        fsGroup: 65532
      volumes:
        - name: docker-config
          emptyDir: {}
        - name: cosign-key
          secret:
            secretName: cosign-signing-key
      initContainers:
        - name: setup-registry-auth
          image: alpine:3.23
          command: [sh, -c]
          args:
            - printf '{"auths":{"registry.infra.tgy.io":{"auth":"%s"}}}' "$(printf '%s:%s' "$HARBOR_USER" "$HARBOR_PASS" | base64)" > /docker-config/config.json
          env:
            - name: HARBOR_USER
              valueFrom:
                secretKeyRef:
                  name: harbor-robot-images
                  key: username
            - name: HARBOR_PASS
              valueFrom:
                secretKeyRef:
                  name: harbor-robot-images
                  key: credential
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: docker-config
              mountPath: /docker-config
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      container:
        image: registry.infra.tgy.io/tools/argo-tools:latest
        command: [sh, -c]
        args:
          - |
            IMAGE="registry.infra.tgy.io/tools/{{inputs.parameters.image-dir}}@{{inputs.parameters.digest}}"
            cosign sign --key /cosign/cosign.key \
              --yes \
              "$IMAGE"
        env:
          - name: HOME
            value: /tmp
          - name: COSIGN_PASSWORD
            value: ""
          - name: DOCKER_CONFIG
            value: /docker-config
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: cosign-key
            mountPath: /cosign
            readOnly: true
          - name: docker-config
            mountPath: /docker-config
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
