apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: secureboot-signing-keys
  namespace: talos-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: secureboot-signing-keys
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: PK.auth
      remoteRef:
        key: secureboot-signing-keys
        property: PK-auth
        decodingStrategy: None
    - secretKey: KEK.auth
      remoteRef:
        key: secureboot-signing-keys
        property: KEK-auth
        decodingStrategy: None
    - secretKey: db.auth
      remoteRef:
        key: secureboot-signing-keys
        property: db-auth
        decodingStrategy: None
    - secretKey: pcr-signing-key.pem
      remoteRef:
        key: secureboot-signing-keys
        property: pcr-signing-key-pem
        decodingStrategy: None
    - secretKey: uki-signing-cert.pem
      remoteRef:
        key: secureboot-signing-keys
        property: uki-signing-cert-pem
        decodingStrategy: None
    - secretKey: uki-signing-key.pem
      remoteRef:
        key: secureboot-signing-keys
        property: uki-signing-key-pem
        decodingStrategy: None
