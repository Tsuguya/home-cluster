name: Digest cooldown

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  cooldown:
    runs-on: ubuntu-latest
    steps:
      - uses: Tsuguya/images/digest-cooldown@530736213e33082b23a6af25372cd612ba176fd5 # main
        with:
          cooldown-days: 3
