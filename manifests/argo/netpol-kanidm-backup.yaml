apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kanidm-backup
  namespace: argo
spec:
  endpointSelector:
    matchLabels:
      kanidm-backup: "true"
  ingressDeny:
    - fromEntities:
        - world
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - toFQDNs:
        - matchPattern: "*.r2.cloudflarestorage.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
