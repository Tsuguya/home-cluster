# filer is stateless (PostgreSQL metadata backend, emptyDir data) so it runs
# as a Deployment instead of the chart's StatefulSet. chart filer is disabled
# (filer.enabled=false in helm-values); the chart still emits the s3 Service
# and bucket-hook which select component=filer, so the labels here match.
#
# Blue/Green rollout: maxSurge=100% / maxUnavailable=0 keeps the old pods
# serving S3 until the new pods are Ready. If a new image is unpullable the
# old pods stay up and S3 keeps working.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-filer
  namespace: seaweedfs
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: seaweedfs
    app.kubernetes.io/component: filer
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/instance: seaweedfs
      app.kubernetes.io/component: filer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
        app.kubernetes.io/instance: seaweedfs
        app.kubernetes.io/component: filer
    spec:
      restartPolicy: Always
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: seaweedfs
                  app.kubernetes.io/instance: seaweedfs
                  app.kubernetes.io/component: filer
              topologyKey: kubernetes.io/hostname
      tolerations:
        - key: memory-constrained
          operator: Exists
          effect: NoSchedule
      serviceAccountName: "seaweedfs"
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      enableServiceLinks: false
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.32
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SEAWEEDFS_FULLNAME
              value: "seaweedfs"
            - name: WEED_CLUSTER_DEFAULT
              value: "sw"
            - name: WEED_CLUSTER_SW_FILER
              value: "seaweedfs-filer-client.seaweedfs:8888"
            - name: WEED_CLUSTER_SW_MASTER
              value: "seaweedfs-master.seaweedfs:9333"
            - name: WEED_FILER_BUCKETS_FOLDER
              value: "/buckets"
            - name: WEED_FILER_OPTIONS_RECURSIVE_DELETE
              value: "false"
            - name: WEED_LEVELDB2_ENABLED
              value: "false"
            - name: WEED_POSTGRES2_CONNECTION_MAX_IDLE
              value: "5"
            - name: WEED_POSTGRES2_CONNECTION_MAX_OPEN
              value: "10"
            - name: WEED_POSTGRES2_CREATETABLE
              value: 'CREATE TABLE IF NOT EXISTS "%s" (dirhash BIGINT, name VARCHAR(65535), directory VARCHAR(65535), meta bytea, PRIMARY KEY (dirhash, name));'
            - name: WEED_POSTGRES2_DATABASE
              value: "seaweedfs"
            - name: WEED_POSTGRES2_ENABLED
              value: "true"
            - name: WEED_POSTGRES2_ENABLEUPSERT
              value: "true"
            - name: WEED_POSTGRES2_HOSTNAME
              value: "shared-pg-rw.database"
            - name: WEED_POSTGRES2_PORT
              value: "5432"
            - name: WEED_POSTGRES2_SSLMODE
              value: "verify-full"
            - name: WEED_POSTGRES2_SSLROOTCERT
              value: "/etc/ssl/certs/pg-ca.crt"
            - name: WEED_POSTGRES2_UPSERTQUERY
              value: 'INSERT INTO "%[1]s" (dirhash, name, directory, meta) VALUES($1, $2, $3, $4) ON CONFLICT (dirhash, name) DO UPDATE SET directory=EXCLUDED.directory, meta=EXCLUDED.meta'
            - name: WEED_POSTGRES2_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: seaweedfs-pg-credentials
            - name: WEED_POSTGRES2_USERNAME
              valueFrom:
                secretKeyRef:
                  key: username
                  name: seaweedfs-pg-credentials
          command:
            - "/bin/sh"
            - "-ec"
            - |
              exec /usr/bin/weed \
              -logdir=/logs \
              -v=1 \
              filer \
              -port=8888 \
              -metricsPort=9327 \
              -dirListLimit=100000 \
              -defaultReplicaPlacement=001 \
              -ip=${POD_IP} \
              -ip.bind=0.0.0.0 \
              -s3 \
              -s3.port=8333 \
              -s3.config=/etc/sw/seaweedfs_s3_config \
              -master=seaweedfs-master-0.seaweedfs-master.seaweedfs:9333,seaweedfs-master-1.seaweedfs-master.seaweedfs:9333,seaweedfs-master-2.seaweedfs-master.seaweedfs:9333
          volumeMounts:
            - name: seaweedfs-filer-log-volume
              mountPath: "/logs/"
            - name: config-users
              mountPath: /etc/sw
              readOnly: true
            - name: data-filer
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: pg-ca-cert
              mountPath: /etc/ssl/certs/pg-ca.crt
              subPath: ca.crt
              readOnly: true
          ports:
            - containerPort: 8888
              name: swfs-filer
            - containerPort: 9327
              name: metrics
            - containerPort: 18888
            - containerPort: 8333
              name: swfs-s3
          readinessProbe:
            httpGet:
              path: /
              port: 8888
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 15
            successThreshold: 1
            failureThreshold: 100
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8888
              scheme: HTTP
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
            timeoutSeconds: 10
          resources:
            limits:
              memory: 1536Mi
            requests:
              cpu: 10m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: seaweedfs-filer-log-volume
          emptyDir: {}
        - name: data-filer
          emptyDir: {}
        - name: config-users
          secret:
            defaultMode: 420
            secretName: seaweedfs-s3-config
        - name: tmp
          emptyDir: {}
        - name: pg-ca-cert
          secret:
            secretName: pg-ca-cert
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-filer-client
  namespace: seaweedfs
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: seaweedfs
    app.kubernetes.io/component: filer
    monitoring: "true"
spec:
  clusterIP: None
  ports:
    - name: "swfs-filer"
      port: 8888
      targetPort: 8888
      protocol: TCP
    - name: "swfs-filer-grpc"
      port: 18888
      targetPort: 18888
      protocol: TCP
    - name: "metrics"
      port: 9327
      targetPort: 9327
      protocol: TCP
  selector:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: seaweedfs
    app.kubernetes.io/component: filer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
  name: seaweedfs-filer
  namespace: seaweedfs
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: seaweedfs
    app.kubernetes.io/component: filer
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: "swfs-filer"
      port: 8888
      targetPort: 8888
      protocol: TCP
    - name: "swfs-filer-grpc"
      port: 18888
      targetPort: 18888
      protocol: TCP
    - name: "swfs-s3"
      port: 8333
      targetPort: 8333
      protocol: TCP
    - name: "metrics"
      port: 9327
      targetPort: 9327
      protocol: TCP
  selector:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: seaweedfs
    app.kubernetes.io/component: filer
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: seaweedfs-filer
  namespace: seaweedfs
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/instance: seaweedfs
    app.kubernetes.io/component: filer
    release: kube-prometheus-stack
spec:
  endpoints:
    - interval: 30s
      port: metrics
      scrapeTimeout: 5s
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
      app.kubernetes.io/instance: seaweedfs
      app.kubernetes.io/component: filer
