apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: claude-code-generic
  namespace: claude-code
spec:
  activeDeadlineSeconds: 3600
  serviceAccountName: claude-code-executor
  entrypoint: main
  onExit: notify
  arguments:
    parameters:
      - name: repo
      - name: branch
      - name: prompt
      - name: skip-if-pr-exists
        default: "true"
      - name: signed-commit
        default: "false"
      - name: pr-title
        default: ""
      - name: pr-labels
        default: ""
  podMetadata:
    labels:
      claude-code: "true"
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: workspace
      emptyDir: {}
    - name: claude-home
      emptyDir: {}
    - name: github-token
      emptyDir: {}
    - name: github-app-secret
      secret:
        secretName: github-app-private-key
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - wn-03
  templates:
    - name: main
      steps:
        - - name: check-existing-pr
            template: check-existing-pr
            when: "{{workflow.parameters.skip-if-pr-exists}} == true"
        - - name: run-audit
            template: claude-code
            when: "'{{workflow.parameters.skip-if-pr-exists}}' != 'true' || '{{steps.check-existing-pr.outputs.result}}' == 'no-pr'"
        - - name: create-signed-pr
            template: create-signed-pr
            when: "'{{workflow.parameters.signed-commit}}' == 'true' && '{{steps.run-audit.status}}' == 'Succeeded'"
            arguments:
              artifacts:
                - name: workspace
                  from: "{{steps.run-audit.outputs.artifacts.workspace}}"

    - name: check-existing-pr
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      script:
        image: registry.infra.tgy.io/tools/argo-tools:latest
        command: [sh]
        source: |
          export GITHUB_TOKEN=$(cat /github-token/token)
          REPO="{{workflow.parameters.repo}}"
          BRANCH="{{workflow.parameters.branch}}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          OPEN_PRS=$(wget -qO- --header="Authorization: token ${GITHUB_TOKEN}" \
            --header="Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls?state=open&head=${OWNER}:${BRANCH}" \
            | jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "has-pr"
          else
            echo "no-pr"
          fi
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

    - name: claude-code
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        fsGroup: 65532
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: setup
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [sh, -c]
          args:
            - |
              export GITHUB_TOKEN=$(cat /github-token/token)
              REPO="{{workflow.parameters.repo}}"
              BRANCH="{{workflow.parameters.branch}}"
              git config --global --add safe.directory /workspace
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" /workspace
              cd /workspace
              git checkout -b "${BRANCH}"
              git config user.name "tgy-cluster-bot[bot]"
              git config user.email "tgy-cluster-bot[bot]@users.noreply.github.com"
          env:
            - name: HOME
              value: /tmp
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: claude-home
              mountPath: /claude-home
            - name: github-token
              mountPath: /github-token
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      outputs:
        artifacts:
          - name: workspace
            path: /workspace
      container:
        image: registry.infra.tgy.io/tools/claude-code:latest
        command: [sh, -c]
        args:
          - |
            export GITHUB_TOKEN=$(cat /github-token/token)
            cd /workspace
            claude --model sonnet -p "$PROMPT" --verbose --allowedTools "Bash,Read,Write,Edit,Glob,Grep,Agent"
        env:
          - name: HOME
            value: /claude-home
          - name: PROMPT
            value: "{{workflow.parameters.prompt}}"
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: claude-code-token
                key: credential
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: claude-home
            mountPath: /claude-home
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi

    - name: create-signed-pr
      inputs:
        artifacts:
          - name: workspace
            path: /workspace
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      script:
        image: registry.infra.tgy.io/tools/argo-tools:latest
        command: [sh]
        source: |
          set -eu
          GITHUB_TOKEN=$(cat /github-token/token)
          export GH_TOKEN=$GITHUB_TOKEN
          export HOME=/tmp

          git config --global --add safe.directory /workspace
          cd /workspace
          REPO="{{workflow.parameters.repo}}"
          BRANCH="{{workflow.parameters.branch}}"
          PR_TITLE="{{workflow.parameters.pr-title}}"
          PR_LABELS="{{workflow.parameters.pr-labels}}"

          PR_BODY="Automated update by Claude"
          if [ -f .pr-body ]; then
            PR_BODY=$(cat .pr-body)
            rm .pr-body
          fi

          git add -A
          CHANGED_FILES=$(git diff --cached --name-only)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected, skipping"
            exit 0
          fi
          echo "Changed files:"
          echo "$CHANGED_FILES"

          BASE_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" -q '.object.sha')
          BASE_TREE=$(gh api "repos/${REPO}/git/commits/${BASE_SHA}" -q '.tree.sha')

          echo "[]" > /tmp/tree_entries.json
          echo "$CHANGED_FILES" > /tmp/changed_files.txt
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              B64=$(base64 < "$file" | tr -d '\n')
              jq -n --arg c "$B64" '{"content":$c,"encoding":"base64"}' > /tmp/blob.json
              BLOB_SHA=$(gh api "repos/${REPO}/git/blobs" \
                --method POST --input /tmp/blob.json -q '.sha')
              jq --arg p "$file" --arg s "$BLOB_SHA" \
                '. + [{"path":$p,"mode":"100644","type":"blob","sha":$s}]' \
                /tmp/tree_entries.json > /tmp/tree_new.json
              mv /tmp/tree_new.json /tmp/tree_entries.json
              echo "  blob: $file -> $BLOB_SHA"
            fi
          done < /tmp/changed_files.txt

          jq -n --arg bt "$BASE_TREE" --slurpfile t /tmp/tree_entries.json \
            '{"base_tree":$bt,"tree":$t[0]}' > /tmp/create_tree.json
          TREE_SHA=$(gh api "repos/${REPO}/git/trees" \
            --method POST --input /tmp/create_tree.json -q '.sha')
          echo "Created tree: $TREE_SHA"

          jq -n --arg msg "$PR_TITLE" --arg tree "$TREE_SHA" --arg parent "$BASE_SHA" \
            '{"message":$msg,"tree":$tree,"parents":[$parent]}' > /tmp/create_commit.json
          COMMIT_SHA=$(gh api "repos/${REPO}/git/commits" \
            --method POST --input /tmp/create_commit.json -q '.sha')
          echo "Created signed commit: $COMMIT_SHA"

          if gh api "repos/${REPO}/git/ref/heads/${BRANCH}" > /dev/null 2>&1; then
            jq -n --arg sha "$COMMIT_SHA" '{"sha":$sha,"force":true}' | \
              gh api "repos/${REPO}/git/refs/heads/${BRANCH}" --method PATCH --input -
            echo "Updated branch: $BRANCH"
          else
            jq -n --arg ref "refs/heads/${BRANCH}" --arg sha "$COMMIT_SHA" \
              '{"ref":$ref,"sha":$sha}' | \
              gh api "repos/${REPO}/git/refs" --method POST --input -
            echo "Created branch: $BRANCH"
          fi

          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          EXISTING=$(gh api "repos/${REPO}/pulls?state=open&head=${OWNER}:${BRANCH}" -q 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists on branch ${BRANCH}"
            exit 0
          fi

          jq -n --arg title "$PR_TITLE" --arg head "$BRANCH" --arg body "$PR_BODY" \
            '{"title":$title,"head":$head,"base":"main","body":$body}' > /tmp/create_pr.json
          PR_URL=$(gh api "repos/${REPO}/pulls" \
            --method POST --input /tmp/create_pr.json -q '.html_url')
          echo "Created PR: $PR_URL"

          if [ -n "$PR_LABELS" ]; then
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "$PR_LABELS" | tr ',' '\n' | jq -R . | jq -s '{"labels":.}' | \
              gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --method POST --input -
            echo "Added labels: $PR_LABELS"
          fi
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

    - name: notify
      steps:
        - - name: send
            templateRef:
              name: discord-notify
              template: send
              clusterScope: true
