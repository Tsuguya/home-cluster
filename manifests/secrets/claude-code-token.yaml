apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-code-token
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: claude-code-token
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: claude-code-token
