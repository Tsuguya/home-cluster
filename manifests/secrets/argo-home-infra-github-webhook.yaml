apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: home-infra-github-webhook
  namespace: argo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: home-infra-github-webhook
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: home-infra-github-webhook
