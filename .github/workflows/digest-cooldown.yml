name: Digest cooldown

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  statuses: write
  pull-requests: write
  contents: read

jobs:
  cooldown:
    runs-on: ubuntu-latest
    steps:
      - uses: Tsuguya/images/digest-cooldown@a613c276e82db3b9cb2cea18e526dce366e8aed8 # main
        with:
          cooldown-days: 3
