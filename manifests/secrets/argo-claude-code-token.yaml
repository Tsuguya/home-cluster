apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-code-token
  namespace: argo
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: claude-code-token
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: claude-code-token
