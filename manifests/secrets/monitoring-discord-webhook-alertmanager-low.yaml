apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-webhook-alertmanager-low
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: discord-webhook-alertmanager-low
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: discord-webhook-alertmanager-low
