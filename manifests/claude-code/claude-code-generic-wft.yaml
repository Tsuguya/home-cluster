apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: claude-code-generic
  namespace: claude-code
spec:
  activeDeadlineSeconds: 3600
  serviceAccountName: claude-code-executor
  entrypoint: main
  onExit: notify
  arguments:
    parameters:
      - name: repo
      - name: branch
      - name: prompt
      - name: skip-if-pr-exists
        default: "true"
      - name: signed-commit
        default: "false"
      - name: pr-title
        default: ""
      - name: pr-labels
        default: ""
  podMetadata:
    labels:
      claude-code: "true"
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: workspace
      emptyDir: {}
    - name: claude-home
      emptyDir: {}
    - name: github-token
      emptyDir: {}
    - name: github-app-secret
      secret:
        secretName: github-app-private-key
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                  - wn-03
  templates:
    - name: main
      steps:
        - - name: check-existing-pr
            template: check-existing-pr
            when: "{{workflow.parameters.skip-if-pr-exists}} == true"
        - - name: run-audit
            template: claude-code
            when: "'{{workflow.parameters.skip-if-pr-exists}}' != 'true' || '{{steps.check-existing-pr.outputs.result}}' == 'no-pr'"
        - - name: create-signed-pr
            template: create-signed-pr
            when: "'{{workflow.parameters.signed-commit}}' == 'true' && '{{steps.run-audit.status}}' == 'Succeeded'"

    - name: check-existing-pr
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      script:
        image: registry.infra.tgy.io/tools/argo-tools:latest
        command: [sh]
        source: |
          export GITHUB_TOKEN=$(cat /github-token/token)
          REPO="{{workflow.parameters.repo}}"
          BRANCH="{{workflow.parameters.branch}}"
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          OPEN_PRS=$(wget -qO- --header="Authorization: token ${GITHUB_TOKEN}" \
            --header="Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/pulls?state=open&head=${OWNER}:${BRANCH}" \
            | jq 'length')
          if [ "$OPEN_PRS" -gt 0 ]; then
            echo "has-pr"
          else
            echo "no-pr"
          fi
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

    - name: claude-code
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
        runAsGroup: 65532
        fsGroup: 65532
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
        - name: setup
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [sh, -c]
          args:
            - |
              export GITHUB_TOKEN=$(cat /github-token/token)
              REPO="{{workflow.parameters.repo}}"
              BRANCH="{{workflow.parameters.branch}}"
              git config --global --add safe.directory /workspace
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" /workspace
              cd /workspace
              git checkout -b "${BRANCH}"
              git config user.name "tgy-cluster-bot[bot]"
              git config user.email "tgy-cluster-bot[bot]@users.noreply.github.com"
              mkdir -p /workspace/.bin
              cp /usr/local/bin/github-signed-commit.sh /workspace/.bin/
          env:
            - name: HOME
              value: /tmp
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: claude-home
              mountPath: /claude-home
            - name: github-token
              mountPath: /github-token
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
      container:
        image: registry.infra.tgy.io/tools/claude-code:latest
        command: [sh, -c]
        args:
          - |
            export GITHUB_TOKEN=$(cat /github-token/token)
            cd /workspace
            SIGNING_INSTRUCTION="

            ## Git コミット（署名付き）
            git commit + git push の代わりに、github-signed-commit.sh を使うこと。
            1. git add でファイルをステージ
            2. /workspace/.bin/github-signed-commit.sh -r {{workflow.parameters.repo}} -m 'コミットメッセージ' を実行
            これにより GitHub API 経由で署名付きコミットが作成され、ローカルも同期される。"
            claude --model sonnet -p "${PROMPT}${SIGNING_INSTRUCTION}" --verbose --allowedTools "Bash,Read,Write,Edit,Glob,Grep,Agent"
        env:
          - name: HOME
            value: /claude-home
          - name: PROMPT
            value: "{{workflow.parameters.prompt}}"
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: claude-code-token
                key: credential
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: claude-home
            mountPath: /claude-home
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 4Gi

    - name: create-signed-pr
      securityContext:
        runAsUser: 65532
        runAsNonRoot: true
      initContainers:
        - name: github-auth
          image: registry.infra.tgy.io/tools/argo-tools:latest
          command: [github-auth.sh]
          env:
            - name: GITHUB_APP_ID
              value: "2998228"
            - name: GITHUB_APP_INSTALLATION_ID
              value: "113765957"
          securityContext:
            runAsUser: 65532
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: github-app-secret
              mountPath: /github-app
              readOnly: true
            - name: github-token
              mountPath: /github-token
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      script:
        image: registry.infra.tgy.io/tools/argo-tools:latest
        command: [sh]
        source: |
          set -eu
          GITHUB_TOKEN=$(cat /github-token/token)
          export GH_TOKEN=$GITHUB_TOKEN
          export HOME=/tmp

          REPO="{{workflow.parameters.repo}}"
          BRANCH="{{workflow.parameters.branch}}"
          PR_TITLE="{{workflow.parameters.pr-title}}"
          PR_LABELS="{{workflow.parameters.pr-labels}}"

          BRANCH_REF=$(gh api "repos/${REPO}/git/ref/heads/${BRANCH}" 2>/dev/null) || {
            echo "Branch ${BRANCH} not found, no changes to process"
            exit 0
          }
          UNSIGNED_SHA=$(echo "$BRANCH_REF" | jq -r '.object.sha')

          COMMIT_INFO=$(gh api "repos/${REPO}/git/commits/${UNSIGNED_SHA}")
          TREE_SHA=$(echo "$COMMIT_INFO" | jq -r '.tree.sha')
          PARENT_SHA=$(echo "$COMMIT_INFO" | jq -r '.parents[0].sha')
          ORIGINAL_MSG=$(echo "$COMMIT_INFO" | jq -r '.message')

          PARENT_TREE=$(gh api "repos/${REPO}/git/commits/${PARENT_SHA}" -q '.tree.sha')
          if [ "$TREE_SHA" = "$PARENT_TREE" ]; then
            echo "No changes in branch, skipping"
            gh api "repos/${REPO}/git/refs/heads/${BRANCH}" --method DELETE || true
            exit 0
          fi

          COMMIT_MSG="${PR_TITLE}"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="$ORIGINAL_MSG"
          fi
          jq -n --arg msg "$COMMIT_MSG" --arg tree "$TREE_SHA" --arg parent "$PARENT_SHA" \
            '{"message":$msg,"tree":$tree,"parents":[$parent]}' > /tmp/create_commit.json
          SIGNED_SHA=$(gh api "repos/${REPO}/git/commits" \
            --method POST --input /tmp/create_commit.json -q '.sha')
          echo "Created signed commit: $SIGNED_SHA (replacing unsigned ${UNSIGNED_SHA})"

          jq -n --arg sha "$SIGNED_SHA" '{"sha":$sha,"force":true}' | \
            gh api "repos/${REPO}/git/refs/heads/${BRANCH}" --method PATCH --input -
          echo "Updated branch: $BRANCH"

          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          EXISTING=$(gh api "repos/${REPO}/pulls?state=open&head=${OWNER}:${BRANCH}" -q 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists on branch ${BRANCH}"
            exit 0
          fi

          PR_BODY=$(echo "$ORIGINAL_MSG" | tail -n +2 | sed '1{/^$/d}')
          if [ -z "$PR_BODY" ]; then
            PR_BODY="Automated update by Claude"
          fi

          jq -n --arg title "$PR_TITLE" --arg head "$BRANCH" --arg body "$PR_BODY" \
            '{"title":$title,"head":$head,"base":"main","body":$body}' > /tmp/create_pr.json
          PR_URL=$(gh api "repos/${REPO}/pulls" \
            --method POST --input /tmp/create_pr.json -q '.html_url')
          echo "Created PR: $PR_URL"

          if [ -n "$PR_LABELS" ]; then
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            echo "$PR_LABELS" | tr ',' '\n' | jq -R . | jq -s '{"labels":.}' | \
              gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --method POST --input -
            echo "Added labels: $PR_LABELS"
          fi
        securityContext:
          runAsUser: 65532
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: github-token
            mountPath: /github-token
            readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi

    - name: notify
      steps:
        - - name: send
            templateRef:
              name: discord-notify
              template: send
              clusterScope: true
