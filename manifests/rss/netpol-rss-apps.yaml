apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rss-server
  namespace: rss
spec:
  endpointSelector:
    matchLabels:
      app: rss-server
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: rss-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rss-ui
  namespace: rss
spec:
  endpointSelector:
    matchLabels:
      app: rss-ui
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: oauth2-proxy-rss
            io.kubernetes.pod.namespace: oauth2-proxy
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: rss-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rss-migration
  namespace: rss
spec:
  endpointSelector:
    matchLabels:
      app: rss-migration
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: rss-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
