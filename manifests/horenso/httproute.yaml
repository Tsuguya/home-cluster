apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: horenso
  namespace: horenso
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main-gateway
      namespace: gateway
      sectionName: https
  hostnames:
    - horenso.infra.tgy.io
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: horenso
          port: 3000
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
