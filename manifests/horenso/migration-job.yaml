apiVersion: batch/v1
kind: Job
metadata:
  name: horenso-migration
  namespace: horenso
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: horenso-migration
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dbmate
          image: ghcr.io/amacneil/dbmate:2
          args: ["--migrations-dir", "/app/db/migrations", "up"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              value: "postgres://horenso:$(PG_PASSWORD)@shared-pg-rw.database:5432/horenso?sslmode=require"
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: horenso-pg-credentials
                  key: password
          volumeMounts:
            - name: migrations
              mountPath: /app/db/migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: horenso-migrations
      restartPolicy: Never
