apiVersion: batch/v1
kind: Job
metadata:
  name: rss-migration
  namespace: rss
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: rss-migration
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dbmate
          image: ghcr.io/amacneil/dbmate:2
          args: ["--migrations-dir", "/app/db/migrations", "up"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rss-pg-credentials
                  key: uri
          volumeMounts:
            - name: migrations
              mountPath: /app/db/migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: rss-migrations
      restartPolicy: Never
