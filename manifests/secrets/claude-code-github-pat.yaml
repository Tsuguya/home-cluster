apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: github-pat-claude-code
  namespace: claude-code
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: github-pat-claude-code
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: github-pat-claude-code
