apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pg-ca-cert
  namespace: harbor
spec:
  secretName: pg-ca-cert
  commonName: pg-ca-harbor
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: pg-ca-issuer
    kind: ClusterIssuer
