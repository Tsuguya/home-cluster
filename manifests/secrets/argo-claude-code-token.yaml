apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: claude-code-token
  namespace: argo
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: claude-code-token
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: claude-code-token
        metadataPolicy: None
