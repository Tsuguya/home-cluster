apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loki-storage
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: loki-storage
    creationPolicy: Orphan
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: seaweedfs-loki-s3
