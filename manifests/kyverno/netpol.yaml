apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kyverno-migrate-resources
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      batch.kubernetes.io/job-name: kyverno-migrate-resources
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kyverno-admission-controller
  namespace: kyverno
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: kyverno
      app.kubernetes.io/component: admission-controller
  ingress:
    - fromEntities:
        - kube-apiserver
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app: harbor
            component: nginx
            io.kubernetes.pod.namespace: harbor
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toFQDNs:
        - matchPattern: "*.sigstore.dev"
        - matchName: "registry.infra.tgy.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
