apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pat
  namespace: talos-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: ghcr-pat
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: github-pat-talos-build
        metadataPolicy: None
        property: credential
