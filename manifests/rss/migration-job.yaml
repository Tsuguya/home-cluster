apiVersion: batch/v1
kind: Job
metadata:
  name: rss-migration
  namespace: rss
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: rss-migration
    spec:
      automountServiceAccountToken: false
      containers:
        - name: dbmate
          image: ghcr.io/amacneil/dbmate:2
          args: ["up"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rss-pg-credentials
                  key: uri
          volumeMounts:
            - name: migrations
              mountPath: /app/db/migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: rss-migrations
      restartPolicy: Never
