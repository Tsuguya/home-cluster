apiVersion: v1
kind: ServiceAccount
metadata:
  name: pluto-checker
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pluto-checker
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-workflows-edit
subjects:
  - kind: ServiceAccount
    name: pluto-checker
    namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pluto-checker
rules:
  - apiGroups: [""]
    resources: [configmaps, endpoints, events, limitranges, namespaces, nodes, persistentvolumeclaims, persistentvolumes, pods, podtemplates, replicationcontrollers, resourcequotas, secrets, serviceaccounts, services]
    verbs: [get, list]
  # Built-in API groups
  - apiGroups: [apps, batch, autoscaling, policy, networking.k8s.io, rbac.authorization.k8s.io, storage.k8s.io, apiextensions.k8s.io, admissionregistration.k8s.io, apiregistration.k8s.io, authentication.k8s.io, authorization.k8s.io, certificates.k8s.io, coordination.k8s.io, discovery.k8s.io, events.k8s.io, flowcontrol.apiserver.k8s.io, node.k8s.io, resource.k8s.io, scheduling.k8s.io, snapshot.storage.k8s.io, groupsnapshot.storage.k8s.io, metrics.k8s.io]
    resources: ["*"]
    verbs: [get, list]
  # CRD API groups
  - apiGroups: [cilium.io, argoproj.io, cert-manager.io, acme.cert-manager.io, postgresql.cnpg.io, onepassword.com, gateway.networking.k8s.io, externaldns.k8s.io, monitoring.coreos.com, monitoring.grafana.com, aquasecurity.github.io, objectbucket.io, trident.qnap.io]
    resources: ["*"]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pluto-checker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pluto-checker
subjects:
  - kind: ServiceAccount
    name: pluto-checker
    namespace: argo
---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pluto-check
  namespace: argo
spec:
  activeDeadlineSeconds: 2400
  serviceAccountName: pluto-checker
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: detect-in-cluster
            template: detect-in-cluster
            continueOn:
              failed: true
          - name: detect-helm
            template: detect-helm
            continueOn:
              failed: true
        - - name: ai-fix
            template: ai-fix
            when: "{{steps.detect-in-cluster.status}} == Failed || {{steps.detect-helm.status}} == Failed"
            arguments:
              artifacts:
                - name: pluto-cluster
                  from: "{{steps.detect-in-cluster.outputs.artifacts.result}}"
                - name: pluto-helm
                  from: "{{steps.detect-helm.outputs.artifacts.result}}"
        - - name: fail-if-deprecated
            template: fail-if-deprecated
            when: "{{steps.detect-in-cluster.status}} == Failed || {{steps.detect-helm.status}} == Failed"

    - name: detect-in-cluster
      script:
        image: us-docker.pkg.dev/fairwinds-ops/oss/pluto:v5.23.0
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 512Mi
        command: [sh]
        source: |
          /pluto detect-all-in-cluster --target-versions k8s=v1.36.0 -o wide > /tmp/result.txt 2>&1
          code=$?
          cat /tmp/result.txt
          exit $code
      outputs:
        artifacts:
          - name: result
            path: /tmp/result.txt
            archive:
              none: {}

    - name: detect-helm
      script:
        image: us-docker.pkg.dev/fairwinds-ops/oss/pluto:v5.23.0
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        command: [sh]
        source: |
          /pluto detect-helm --target-versions k8s=v1.36.0 -o wide > /tmp/result.txt 2>&1
          code=$?
          cat /tmp/result.txt
          exit $code
      outputs:
        artifacts:
          - name: result
            path: /tmp/result.txt
            archive:
              none: {}

    - name: ai-fix
      timeout: "30m"
      inputs:
        artifacts:
          - name: pluto-cluster
            path: /tmp/pluto-cluster.txt
          - name: pluto-helm
            path: /tmp/pluto-helm.txt
      script:
        image: registry.infra.tgy.io/tools/claude-code:latest
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
        command: [sh]
        env:
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: claude-code-token
                key: credential
          - name: GITHUB_APP_PRIVATE_KEY
            valueFrom:
              secretKeyRef:
                name: github-app-private-key
                key: private-key
          - name: GITHUB_APP_ID
            value: "2998228"
          - name: GITHUB_APP_INSTALLATION_ID
            value: "113765957"
        source: |
          set -euo pipefail

          echo "=== Generating GitHub App installation token ==="
          echo "$GITHUB_APP_PRIVATE_KEY" > /tmp/app-key.pem
          NOW=$(date +%s)
          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | base64 -w 0 | tr '+/' '-_' | tr -d '=')
          PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$((NOW - 60))" "$((NOW + 600))" "$GITHUB_APP_ID" | base64 -w 0 | tr '+/' '-_' | tr -d '=')
          SIGNATURE=$(printf '%s.%s' "$HEADER" "$PAYLOAD" | openssl dgst -sha256 -sign /tmp/app-key.pem -binary | base64 -w 0 | tr '+/' '-_' | tr -d '=')
          GITHUB_TOKEN=$(curl -s -X POST \
            -H "Authorization: Bearer ${HEADER}.${PAYLOAD}.${SIGNATURE}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/app/installations/${GITHUB_APP_INSTALLATION_ID}/access_tokens" \
            | jq -r '.token')
          export GITHUB_TOKEN
          rm -f /tmp/app-key.pem

          echo "=== Cloning home-cluster ==="
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/Tsuguya/home-cluster.git" /tmp/workspace
          cd /tmp/workspace

          echo "[detect-all-in-cluster]"
          cat /tmp/pluto-cluster.txt
          echo "[detect-helm]"
          cat /tmp/pluto-helm.txt

          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          Kubernetes クラスターで deprecated API が検出されました（対象: k8s v1.36.0）。

          この home-cluster リポジトリの manifests/ と helm-values/ を調査して、
          deprecated/removed な apiVersion を新しい apiVersion に更新してください。

          git 操作は行わないでください（スクリプトが処理します）。

          ## Pluto detect-all-in-cluster
          PROMPT_EOF

          cat /tmp/pluto-cluster.txt >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "## Pluto detect-helm" >> /tmp/prompt.txt
          cat /tmp/pluto-helm.txt >> /tmp/prompt.txt

          echo "=== Running Claude Code ==="
          claude --print "$(cat /tmp/prompt.txt)" \
            --allowedTools Edit,Read,Bash,Glob,Grep,Write

          if ! git diff --quiet HEAD || git ls-files --others --exclude-standard | grep -q .; then
            :
          else
            echo "No changes made by Claude"
            exit 1
          fi

          echo "=== Creating signed commit via GitHub GraphQL API ==="
          REPO="Tsuguya/home-cluster"
          BRANCH="fix/deprecated-api-$(date +%Y%m%d-%H%M%S)"
          BASE_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          gh api "repos/${REPO}/git/refs" --method POST --input - <<JEOF
          {"ref":"refs/heads/${BRANCH}","sha":"${BASE_SHA}"}
          JEOF
          echo "Branch created: ${BRANCH}"

          ADDITIONS="[]"
          for f in $(git diff --name-only HEAD) $(git ls-files --others --exclude-standard); do
            [ -z "$f" ] && continue
            CONTENT=$(base64 -w 0 < "$f")
            ADDITIONS=$(echo "$ADDITIONS" | jq --arg p "$f" --arg c "$CONTENT" '. + [{"path":$p,"contents":$c}]')
          done
          DELETIONS="[]"
          for f in $(git diff --name-only --diff-filter=D HEAD); do
            [ -z "$f" ] && continue
            DELETIONS=$(echo "$DELETIONS" | jq --arg p "$f" '. + [{"path":$p}]')
          done
          echo "Additions: $(echo "$ADDITIONS" | jq '[.[].path]'), Deletions: $DELETIONS"

          GRAPHQL_PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg oid "$BASE_SHA" \
            --argjson additions "$ADDITIONS" \
            --argjson deletions "$DELETIONS" \
            '{
              query: "mutation($input:CreateCommitOnBranchInput!){createCommitOnBranch(input:$input){commit{oid}}}",
              variables: {
                input: {
                  branch: {repositoryNameWithOwner: $repo, branchName: $branch},
                  message: {
                    headline: "fix: update deprecated Kubernetes API versions for k8s v1.36.0",
                    body: "Auto-fixed by Claude Code (triggered by Pluto check).\nReview before merging."
                  },
                  fileChanges: {additions: $additions, deletions: $deletions},
                  expectedHeadOid: $oid
                }
              }
            }')
          COMMIT_OID=$(echo "$GRAPHQL_PAYLOAD" | gh api graphql --input - --jq '.data.createCommitOnBranch.commit.oid')
          echo "Signed commit: ${COMMIT_OID}"

          cat > /tmp/pr-body.txt << 'BODY_EOF'
          ## Summary

          Pluto が k8s v1.36.0 で deprecated/removed となる API を検出したため、Claude Code が自動修正しました。

          ## Pluto 検出結果

          ```
          BODY_EOF

          cat /tmp/pluto-cluster.txt >> /tmp/pr-body.txt
          cat /tmp/pluto-helm.txt >> /tmp/pr-body.txt
          printf '```\n\n---\n> 自動生成された PR です。マージ前に変更内容を必ず確認してください。\n' >> /tmp/pr-body.txt

          gh pr create \
            --repo "$REPO" \
            --title "fix: update deprecated Kubernetes API versions (k8s v1.36.0)" \
            --body-file /tmp/pr-body.txt \
            --head "$BRANCH" \
            --base main

          echo "PR created for branch: $BRANCH"

    - name: fail-if-deprecated
      container:
        image: alpine:3.23
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            memory: 64Mi
        command: [sh, -c]
        args:
          - |
            echo "Deprecated APIs found. PR has been created for review."
            exit 1
---
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: pluto-check
  namespace: argo
spec:
  schedule: "0 10 * * 0"
  timezone: Asia/Tokyo
  concurrencyPolicy: Replace
  workflowSpec:
    workflowTemplateRef:
      name: pluto-check
