apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-kanidm-oauth
  namespace: harbor
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: harbor-kanidm-oauth
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        conversionStrategy: Default
        decodingStrategy: None
        key: harbor-kanidm-oauth
        metadataPolicy: None
